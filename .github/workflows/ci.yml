name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    env:
      # Dummy values — only needed to satisfy NextAuth/Supabase init, not called at build time
      AUTH_SECRET: ci-build-secret
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      AZURE_AD_CLIENT_ID: ci-placeholder
      AZURE_AD_CLIENT_SECRET: ci-placeholder
      AZURE_AD_TENANT_ID: ci-placeholder
      # Real values required — home page fetches Contentful at build time (SSG)
      CONTENTFUL_SPACE: ${{ secrets.CONTENTFUL_SPACE }}
      CONTENTFUL_TOKEN: ${{ secrets.CONTENTFUL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

